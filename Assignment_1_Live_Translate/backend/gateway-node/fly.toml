app = "live-translate-gateway-pananthg"
primary_region = "iad"

[build]

[env]
  PORT = "8787"
  AI_SERVICE_URL = "https://live-translate-ai-pananthg.fly.dev"
  AI_TIMEOUT_MS = "40000"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
